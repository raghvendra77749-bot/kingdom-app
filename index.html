<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM PRO | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@400;700&display=swap');
        
        :root {
            --gold: linear-gradient(135deg, #ff9d00 0%, #ffeb3b 50%, #ff9d00 100%);
            --silver: linear-gradient(135deg, #757f9a 0%, #d7dde8 50%, #757f9a 100%);
            --bronze: linear-gradient(135deg, #804a00 0%, #cd7f32 50%, #804a00 100%);
            --neon: #00f2ff;
            --pink: #ff007f;
        }

        body {
            margin: 0; background: #050505; color: #fff; font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Header UI */
        .header-ui {
            width: 100%; padding: 15px 0; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-around; align-items: center;
        }

        .logo-text { font-family: 'Cinzel', serif; font-size: 1.5rem; color: #ffcc00; text-shadow: 0 0 10px rgba(255,204,0,0.5); }

        .btn-admin {
            background: transparent; color: #fff; border: 2px solid var(--pink);
            padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold;
            box-shadow: 0 0 10px var(--pink);
        }
        .btn-admin.active { background: var(--pink); }

        .btn-save {
            background: var(--neon); color: #000; border: none; padding: 10px 25px;
            border-radius: 5px; font-weight: 900; cursor: pointer; display: none;
            box-shadow: 0 0 15px var(--neon);
        }

        /* The Throne Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 15px; margin: 40px 0; width: 95%; }
        
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 20px 10px; text-align: center; flex: 1;
        }
        .king-card { border: 2px solid #ffcc00; transform: scale(1.1); box-shadow: 0 0 20px rgba(255,204,0,0.2); }

        .avatar-circle {
            width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px;
            border: 2px solid #333; overflow: hidden; background: #111;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .avatar-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* FIXED NAME EDITING */
        .name-tag {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 1rem;
            min-height: 25px; display: block; outline: none; padding: 5px;
        }
        .admin-on .name-tag { background: rgba(255,255,255,0.1); border-radius: 4px; border-bottom: 2px solid var(--neon); }

        /* Grids */
        .grid-section { width: 92%; max-width: 1200px; margin-bottom: 100px; }
        .grid-title { 
            font-family: 'Cinzel', serif; font-size: 1.2rem; margin: 30px 0 15px; 
            letter-spacing: 2px; border-left: 4px solid var(--neon); padding-left: 10px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }

        .plate {
            height: 70px; border-radius: 10px; display: flex; align-items: center; 
            padding: 0 10px; cursor: pointer; border: 1px solid rgba(0,0,0,0.2); position: relative;
        }
        .plate img { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; display: none; margin-right: 10px; z-index: 2; }
        .plate-name { z-index: 5; font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.8rem; outline: none; flex-grow: 1; }

        .gold { background: var(--gold); color: #3d2b1f; }
        .silver { background: var(--silver); color: #222; }
        .bronze { background: var(--bronze); color: #fff; }

        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="header-ui">
        <div class="logo-text">THE KINGDOM</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-admin" id="adminBtn" onclick="toggleAdmin()">ADMIN: OFF</button>
            <button class="btn-save" id="saveBtn" onclick="saveData()">SAVE & LIVE</button>
        </div>
    </div>

    <div class="stage">
        <div class="card">
            <div class="avatar-circle" onclick="pick(this)"><img id="img-k2">🥈</div>
            <div class="name-tag" id="txt-k2" contenteditable="false">VACANT</div>
        </div>
        <div class="card king-card">
            <div class="avatar-circle" style="width: 100px; height: 100px;" onclick="pick(this)"><img id="img-k1">👑</div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color: #ffcc00;">SUPREME KING</div>
        </div>
        <div class="card">
            <div class="avatar-circle" onclick="pick(this)"><img id="img-k3">🥉</div>
            <div class="name-tag" id="txt-k3" contenteditable="false">VACANT</div>
        </div>
    </div>

    <div class="grid-section">
        <h2 class="grid-title" style="color: #ffcc00;">GOLD DYNASTY</h2>
        <div class="grid" id="gold-grid"></div>
        
        <h2 class="grid-title" style="color: #d7dde8; border-color: #d7dde8;">SILVER DYNASTY</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 class="grid-title" style="color: #cd7f32; border-color: #cd7f32;">BRONZE LEGION</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="fileInp" onchange="loadImg(event)">

    <script>
        let isEdit = false;
        let selected = null;

        function toggleAdmin() {
            isEdit = !isEdit;
            document.getElementById('adminBtn').innerText = isEdit ? "ADMIN: ON" : "ADMIN: OFF";
            document.getElementById('adminBtn').classList.toggle('active');
            document.getElementById('saveBtn').style.display = isEdit ? "block" : "none";
            document.getElementById('body').classList.toggle('admin-on');

            document.querySelectorAll('[contenteditable]').forEach(el => {
                el.contentEditable = isEdit;
            });
        }

        function createGrid(containerId, count, cls) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `plate ${cls}`;
                div.id = `${containerId}-s${i}`;
                div.innerHTML = `<img id="img-${div.id}"><div class="plate-name" id="txt-${div.id}" contenteditable="false">SLOT ${i}</div>`;
                div.onclick = (e) => { if(isEdit && e.target.className !== 'plate-name') pick(div); };
                container.appendChild(div);
            }
        }

        function pick(el) { if(isEdit) { selected = el; document.getElementById('fileInp').click(); } }

        function loadImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = selected.querySelector('img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            const data = { txt: {}, img: {} };
            document.querySelectorAll('[contenteditable]').forEach(el => data.txt[el.id] = el.innerText);
            document.querySelectorAll('img').forEach(img => {
                if(img.src.startsWith('data:')) data.img[img.id] = img.src;
            });
            localStorage.setItem('KINGDOM_V_FINAL', JSON.stringify(data));
            alert("Kingdom Saved!");
        }

        window.onload = () => {
            createGrid('gold-grid', 10, 'gold');
            createGrid('silver-grid', 15, 'silver');
            createGrid('bronze-grid', 20, 'bronze');

            const saved = localStorage.getItem('KINGDOM_V_FINAL');
            if(!saved) return;
            const data = JSON.parse(saved);
            for(let id in data.txt) if(document.getElementById(id)) document.getElementById(id).innerText = data.txt[id];
            for(let id in data.img) {
                const img = document.getElementById(id);
                if(img) { img.src = data.img[id]; img.style.display = 'block'; }
            }
        };
    </script>
</body>
</html>
