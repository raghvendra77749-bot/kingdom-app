<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        /* Loading your custom font */
        @font-face {
            font-family: 'VampireWars';
            src: url('Vampire Wars.ttf');
        }

        body {
            margin: 0; background: #000; color: #fff; font-family: 'VampireWars', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Admin Bar */
        .nav {
            position: sticky; top: 0; width: 100%; background: rgba(20, 20, 20, 0.95);
            padding: 15px 0; display: flex; justify-content: center; gap: 20px;
            border-bottom: 3px solid #ff0000; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn {
            padding: 12px 35px; border: none; border-radius: 5px; font-weight: bold; 
            cursor: pointer; font-family: 'VampireWars', sans-serif; text-transform: uppercase;
            font-size: 1rem; transition: 0.3s;
        }
        #edit-btn { background: #ff0000; color: #fff; box-shadow: 0 0 10px #ff0000; }
        #save-btn { background: #fff; color: #000; display: none; box-shadow: 0 0 15px #fff; }

        header { margin: 40px 0; text-align: center; }
        h1 { font-size: 5rem; color: #ff0000; margin: 0; text-shadow: 0 0 20px #ff0000; letter-spacing: 5px; }

        /* Kings Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-bottom: 60px; width: 95%; }
        .throne {
            background: #111; border-radius: 15px; padding: 30px 10px;
            text-align: center; flex: 1; border: 1px solid #444;
        }
        .rank-1 { border: 4px solid #ff0000; transform: scale(1.1); box-shadow: 0 0 40px rgba(255, 0, 0, 0.3); }
        
        .p-box {
            width: 130px; height: 130px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid #ff0000; overflow: hidden; background: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .p-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .p-box span { font-size: 50px; }

        .name-tag { font-size: 1.8rem; outline: none; color: #fff; min-height: 40px; }

        /* Grid Slots - FIXED SIZE & CENTERING */
        .container { width: 95%; max-width: 1300px; padding-bottom: 100px; }
        .grid-title { 
            font-size: 3rem; margin: 60px 0 30px; 
            text-align: center; color: #fff; border-bottom: 4px solid #ff0000; display: inline-block; padding: 0 30px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        
        .plate {
            height: 120px; border-radius: 10px; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 20px; border: 2px solid #fff;
        }
        
        .plate span { width: 100%; outline: none; font-size: 1.8rem; line-height: 120px; display: block; }

        .gold { background: linear-gradient(135deg, #ff9d00, #ffeb3b); color: #000; }
        .silver { background: linear-gradient(135deg, #757f9a, #d7dde8); color: #000; }
        .bronze { background: linear-gradient(135deg, #804a00, #cd7f32); color: #fff; }

        .admin-on [contenteditable="true"] { background: rgba(255, 255, 255, 0.2); border-radius: 5px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="nav">
        <button class="btn" id="edit-btn" onclick="toggleAdmin()">EDIT: OFF</button>
        <button class="btn" id="save-btn" onclick="saveData()">PUBLISH</button>
    </div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="color: #ff0000; font-size: 1.2rem; letter-spacing: 10px;">RAGHAV EDITZ</p>
    </header>

    <div class="stage">
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k2"><span>🥈</span></div>
            <div class="name-tag" id="txt-k2" contenteditable="false">EMPTY</div>
        </div>
        <div class="throne rank-1">
            <div class="p-box" style="width:160px; height:160px;" onclick="pick(this)"><img id="img-k1"><span>👑</span></div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color:#ff0000;">KING</div>
        </div>
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k3"><span>🥉</span></div>
            <div class="name-tag" id="txt-k3" contenteditable="false">EMPTY</div>
        </div>
    </div>

    <center><div class="grid-title">GOLD</div></center>
    <div class="container"><div class="grid" id="gold-grid"></div></div>
    
    <center><div class="grid-title" style="border-color:#d7dde8;">SILVER</div></center>
    <div class="container"><div class="grid" id="silver-grid"></div></div>

    <center><div class="grid-title" style="border-color:#cd7f32;">BRONZE</div></center>
    <div class="container"><div class="grid" id="bronze-grid"></div></div>

    <input type="file" id="fileInp" accept="image/*" onchange="applyImg(event)">

    <script>
        let edit = false;
        let activeTarget = null;

        function toggleAdmin() {
            edit = !edit;
            document.getElementById('edit-btn').innerText = edit ? "EDIT: ON" : "EDIT: OFF";
            document.getElementById('save-btn').style.display = edit ? "block" : "none";
            document.getElementById('body').classList.toggle('admin-on');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = edit);
        }

        function build(gid, count, cls) {
            const g = document.getElementById(gid);
            for(let i=1; i<=count; i++) {
                const d = document.createElement('div');
                d.className = `plate ${cls}`;
                d.innerHTML = `<span id="${gid}-${i}" contenteditable="false">#${i}</span>`;
                g.appendChild(d);
            }
        }

        function pick(el) { if(edit) { activeTarget = el; document.getElementById('fileInp').click(); } }

        function applyImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const tempImg = new Image();
                tempImg.src = ev.target.result;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200; canvas.height = 200;
                    ctx.drawImage(tempImg, 0, 0, 200, 200);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.5); // Fast & Small
                    const img = activeTarget.querySelector('img');
                    const span = activeTarget.querySelector('span');
                    img.src = compressedData; img.style.display = 'block';
                    if(span) span.style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            try {
                const d = { txt: {}, img: {} };
                document.querySelectorAll('[contenteditable]').forEach(el => d.txt[el.id] = el.innerText);
                document.querySelectorAll('.p-box img').forEach(i => { if(i.src.includes('data:')) d.img[i.id] = i.src; });
                
                localStorage.clear(); // Poora purana kachra saaf!
                localStorage.setItem('KINGDOM_VAMPIRE', JSON.stringify(d));
                
                alert("SUCCESS! Published to Kingdom.");
                toggleAdmin();
            } catch(e) {
                alert("SAVE FAILED: Image is still too big. Refresh and try smaller photo.");
            }
        }

        window.onload = () => {
            build('gold-grid', 10, 'gold');
            build('silver-grid', 15, 'silver');
            build('bronze-grid', 20, 'bronze');

            const s = localStorage.getItem('KINGDOM_VAMPIRE');
            if(!s) return;
            const data = JSON.parse(s);
            for(let id in data.txt) if(document.getElementById(id)) document.getElementById(id).innerText = data.txt[id];
            for(let id in data.img) {
                const i = document.getElementById(id);
                if(i) { 
                    i.src = data.img[id]; i.style.display = 'block'; 
                    if(i.parentElement.querySelector('span')) i.parentElement.querySelector('span').style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
