<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;600&display=swap');
        
        :root {
            --gold: linear-gradient(145deg, #bf953f, #fcf6ba, #b38728);
            --silver: linear-gradient(145deg, #999, #e0e0e0, #777);
            --bronze: linear-gradient(145deg, #804a00, #cd7f32, #593300);
            --accent: #bc1888;
        }

        body {
            margin: 0; background: #000; color: #fff; font-family: 'Outfit', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            background-image: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }

        /* Nav Bar for App */
        .nav-bar {
            position: sticky; top: 0; width: 100%; background: rgba(0,0,0,0.9);
            padding: 15px 0; display: flex; justify-content: space-around;
            border-bottom: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn {
            background: var(--accent); color: white; border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: 900; cursor: pointer; font-size: 14px;
            box-shadow: 0 0 15px rgba(188, 24, 136, 0.4);
        }

        .admin-panel { display: none; gap: 10px; }

        header { margin-top: 30px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: #ffcc00; margin: 0; letter-spacing: 5px; }

        /* Stage Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 15px; margin: 30px 0; width: 95%; }
        .throne {
            background: rgba(255,255,255,0.05); border-radius: 30px; padding: 25px 10px;
            text-align: center; flex: 1; border: 1px solid rgba(255,255,255,0.1);
        }
        .rank-1 { border: 2px solid #ffcc00; transform: scale(1.05); background: rgba(255,204,0,0.05); }

        .p-box {
            width: 100px; height: 100px; border-radius: 50%; margin: 10px auto;
            border: 2px solid #444; overflow: hidden; background: #111; cursor: pointer;
        }
        .p-box img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Grid */
        .container { width: 90%; max-width: 1100px; padding-bottom: 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 25px; }
        
        .plate {
            height: 75px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-weight: 900; cursor: pointer; position: relative;
            overflow: hidden; border: 1px solid rgba(255,255,255,0.1); font-size: 12px;
        }
        .plate img { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        .plate span { z-index: 5; text-align: center; width: 90%; pointer-events: none; }

        .gold { background: var(--gold); color: #3d2b1f; }
        .silver { background: var(--silver); color: #222; }
        .bronze { background: var(--bronze); color: #fff; }
        .active-img { background: #000 !important; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="nav-bar">
        <button class="btn" onclick="toggleAdmin()">ADMIN MODE</button>
        <div class="admin-panel" id="adminUI">
            <button class="btn" style="background:#28a745;" onclick="saveKingdom()">SAVE & LIVE</button>
        </div>
    </div>

    <header>
        <h1 id="title" contenteditable="false">THE KINGDOM</h1>
        <p style="color:#ffcc00; font-size: 12px; letter-spacing: 2px;">BY RAGHAV EDITZ</p>
    </header>

    <div class="stage">
        <div class="throne">🥈<div class="p-box" onclick="handleEdit(this)"><img id="img-k2"></div><div id="name-k2" contenteditable="false">EMPTY</div></div>
        <div class="throne rank-1">👑<div class="p-box" style="width:130px; height:130px;" onclick="handleEdit(this)"><img id="img-k1"></div><div id="name-k1" contenteditable="false" style="color:#ffcc00;">SUPREME KING</div></div>
        <div class="throne">🥉<div class="p-box" onclick="handleEdit(this)"><img id="img-k3"></div><div id="name-k3" contenteditable="false">EMPTY</div></div>
    </div>

    <div class="container">
        <h3 style="color:#ffcc00; border-left: 4px solid #ffcc00; padding-left: 10px;">GOLD SLOTS (10)</h3>
        <div class="grid" id="gold-grid"></div>
        
        <h3 style="color:#e0e0e0; border-left: 4px solid #e0e0e0; padding-left: 10px; margin-top: 40px;">SILVER SLOTS (15)</h3>
        <div class="grid" id="silver-grid"></div>

        <h3 style="color:#cd7f32; border-left: 4px solid #cd7f32; padding-left: 10px; margin-top: 40px;">BRONZE SLOTS (20)</h3>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="upload" onchange="previewImage(event)">

    <script>
        let adminMode = false;
        let selectedElement = null;

        function toggleAdmin() {
            adminMode = !adminMode;
            document.getElementById('adminUI').style.display = adminMode ? 'flex' : 'none';
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = adminMode);
            alert("Admin Mode: " + (adminMode ? "ON" : "OFF"));
        }

        function buildGrids() {
            createPlates('gold-grid', 10, 'gold');
            createPlates('silver-grid', 15, 'silver');
            createPlates('bronze-grid', 20, 'bronze');
            loadKingdom();
        }

        function createPlates(boxId, count, cls) {
            const box = document.getElementById(boxId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `plate ${cls}`;
                div.id = `${boxId}-s${i}`;
                div.innerHTML = `<img id="img-${div.id}"><span id="txt-${div.id}">SLOT ${i}</span>`;
                div.onclick = function() { if(adminMode) { selectedElement = div; document.getElementById('upload').click(); } };
                box.appendChild(div);
            }
        }

        function handleEdit(el) { if(adminMode) { selectedElement = el; document.getElementById('upload').click(); } }

        function previewImage(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(ev) {
                const img = selectedElement.querySelector('img');
                img.src = ev.target.result;
                img.style.display = 'block';
                if(selectedElement.classList.contains('plate')) selectedElement.classList.add('active-img');
            }
            reader.readAsDataURL(file);
        }

        function saveKingdom() {
            const data = { texts: {}, images: {} };
            document.querySelectorAll('[contenteditable]').forEach(el => data.texts[el.id] = el.innerText);
            document.querySelectorAll('img').forEach(img => {
                if(img.src.includes('data:')) data.images[img.id] = img.src;
            });
            localStorage.setItem('KINGDOM_PRO_STORAGE', JSON.stringify(data));
            alert("Sab set hai bhai! Data save ho gaya.");
        }

        function loadKingdom() {
            const saved = localStorage.getItem('KINGDOM_PRO_STORAGE');
            if(!saved) return;
            const data = JSON.parse(saved);
            for(let id in data.texts) if(document.getElementById(id)) document.getElementById(id).innerText = data.texts[id];
            for(let id in data.images) {
                const img = document.getElementById(id);
                if(img) {
                    img.src = data.images[id]; img.style.display = 'block';
                    if(img.parentElement.classList.contains('plate')) img.parentElement.classList.add('active-img');
                }
            }
        }

        window.onload = buildGrids;
    </script>
</body>
</html>
