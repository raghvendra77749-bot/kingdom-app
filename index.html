<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        /* Loading Vampire Wars Font */
        @font-face {
            font-family: 'Vampire';
            src: url('Vampire Wars.ttf');
        }

        body {
            margin: 0; background: #000; color: #fff; font-family: 'Vampire', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Nav Bar */
        .nav {
            position: sticky; top: 0; width: 100%; background: rgba(15, 0, 0, 0.95);
            padding: 15px 0; display: flex; justify-content: center; gap: 25px;
            border-bottom: 4px solid #ff0000; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn {
            padding: 12px 35px; border: 2px solid #ff0000; border-radius: 5px; 
            font-weight: bold; cursor: pointer; font-family: 'Vampire', sans-serif; 
            text-transform: uppercase; font-size: 1.1rem; transition: 0.3s;
        }
        #edit-btn { background: #000; color: #ff0000; box-shadow: 0 0 10px #ff0000; }
        #save-btn { background: #ff0000; color: #000; display: none; box-shadow: 0 0 20px #ff0000; }

        header { margin: 50px 0; text-align: center; }
        h1 { font-size: 5.5rem; color: #ff0000; margin: 0; text-shadow: 0 0 30px #ff0000; letter-spacing: 4px; }

        /* Throne Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-bottom: 70px; width: 95%; }
        .throne {
            background: #0a0a0a; border-radius: 10px; padding: 35px 15px;
            text-align: center; flex: 1; border: 1px solid #333; transition: 0.4s;
        }
        .rank-1 { border: 4px solid #ff0000; transform: scale(1.15); box-shadow: 0 0 50px rgba(255, 0, 0, 0.4); }
        
        .p-box {
            width: 140px; height: 140px; border-radius: 50%; margin: 0 auto 25px;
            border: 4px solid #ff0000; overflow: hidden; background: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .p-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .p-box span { font-size: 60px; filter: grayscale(1); }

        .name-tag { font-size: 2.2rem; outline: none; color: #fff; letter-spacing: 2px; }

        /* Slots Grid - Massive & Clear */
        .container { width: 95%; max-width: 1400px; padding-bottom: 120px; }
        .grid-title { 
            font-size: 3.5rem; margin: 80px 0 40px; 
            text-align: center; color: #fff; border-bottom: 5px solid #ff0000; display: inline-block; padding: 0 40px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        
        .plate {
            height: 130px; border-radius: 5px; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 0 20px; border: 3px solid #fff; position: relative;
        }
        
        .plate span { width: 100%; outline: none; font-size: 2.2rem; display: block; letter-spacing: 2px; }

        .gold { background: linear-gradient(135deg, #d4af37, #f1c40f); color: #000; border-color: #000; }
        .silver { background: linear-gradient(135deg, #bdc3c7, #95a5a6); color: #000; border-color: #000; }
        .bronze { background: linear-gradient(135deg, #a0522d, #8b4513); color: #fff; border-color: #fff; }

        .admin-on [contenteditable="true"] { background: rgba(255, 0, 0, 0.2); border: 2px dashed #ff0000; }
        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="nav">
        <button class="btn" id="edit-btn" onclick="toggleAdmin()">MOD: OFF</button>
        <button class="btn" id="save-btn" onclick="saveData()">PUBLISH</button>
    </div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="color: #ff0000; font-size: 1.5rem; letter-spacing: 15px;">RAGHAV EDITZ</p>
    </header>

    <div class="stage">
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k2"><span>2</span></div>
            <div class="name-tag" id="txt-k2" contenteditable="false">EMPTY</div>
        </div>
        <div class="throne rank-1">
            <div class="p-box" style="width:170px; height:170px;" onclick="pick(this)"><img id="img-k1"><span>1</span></div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color:#ff0000;">SUPREME</div>
        </div>
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k3"><span>3</span></div>
            <div class="name-tag" id="txt-k3" contenteditable="false">EMPTY</div>
        </div>
    </div>

    <center><div class="grid-title">GOLD</div></center>
    <div class="container"><div class="grid" id="gold-grid"></div></div>
    
    <center><div class="grid-title" style="border-color:#bdc3c7;">SILVER</div></center>
    <div class="container"><div class="grid" id="silver-grid"></div></div>

    <center><div class="grid-title" style="border-color:#a0522d;">BRONZE</div></center>
    <div class="container"><div class="grid" id="bronze-grid"></div></div>

    <input type="file" id="fileInp" accept="image/*" onchange="applyImg(event)">

    <script>
        let edit = false;
        let activeTarget = null;

        function toggleAdmin() {
            edit = !edit;
            document.getElementById('edit-btn').innerText = edit ? "MOD: ON" : "MOD: OFF";
            document.getElementById('save-btn').style.display = edit ? "block" : "none";
            document.getElementById('body').classList.toggle('admin-on');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = edit);
        }

        function build(gid, count, cls) {
            const g = document.getElementById(gid);
            for(let i=1; i<=count; i++) {
                const d = document.createElement('div');
                d.className = `plate ${cls}`;
                d.innerHTML = `<span id="${gid}-${i}" contenteditable="false">PLAYER ${i}</span>`;
                g.appendChild(d);
            }
        }

        function pick(el) { if(edit) { activeTarget = el; document.getElementById('fileInp').click(); } }

        function applyImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const tempImg = new Image();
                tempImg.src = ev.target.result;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 200; canvas.height = 200;
                    ctx.drawImage(tempImg, 0, 0, 200, 200);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.5);
                    const img = activeTarget.querySelector('img');
                    const span = activeTarget.querySelector('span');
                    img.src = compressedData; img.style.display = 'block';
                    if(span) span.style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            try {
                const d = { txt: {}, img: {} };
                document.querySelectorAll('[contenteditable]').forEach(el => d.txt[el.id] = el.innerText);
                document.querySelectorAll('.p-box img').forEach(i => { if(i.src.includes('data:')) d.img[i.id] = i.src; });
                
                localStorage.clear();
                localStorage.setItem('KINGDOM_VAMPIRE_V2', JSON.stringify(d));
                alert("KINGDOM UPDATED!");
                toggleAdmin();
            } catch(e) {
                alert("MEMORY FULL: Please refresh or use smaller logos.");
            }
        }

        window.onload = () => {
            build('gold-grid', 10, 'gold');
            build('silver-grid', 15, 'silver');
            build('bronze-grid', 20, 'bronze');

            const s = localStorage.getItem('KINGDOM_VAMPIRE_V2');
            if(!s) return;
            const data = JSON.parse(s);
            for(let id in data.txt) if(document.getElementById(id)) document.getElementById(id).innerText = data.txt[id];
            for(let id in data.img) {
                const i = document.getElementById(id);
                if(i) { 
                    i.src = data.img[id]; i.style.display = 'block'; 
                    if(i.parentElement.querySelector('span')) i.parentElement.querySelector('span').style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
