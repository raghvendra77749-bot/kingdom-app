<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        /* Premium Fonts */
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Montserrat:wght@900&display=swap');
        
        :root {
            --gold: linear-gradient(135deg, #ff9d00, #fff5a0, #ff9d00);
            --silver: linear-gradient(135deg, #757f9a, #d7dde8, #757f9a);
            --bronze: linear-gradient(135deg, #804a00, #cd7f32, #593300);
        }

        body {
            margin: 0; background: #000; color: #fff; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        /* Nav Bar */
        .nav {
            position: sticky; top: 0; width: 100%; background: rgba(10,10,10,0.95);
            padding: 15px 0; display: flex; justify-content: center; gap: 20px;
            border-bottom: 2px solid #222; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn {
            padding: 12px 30px; border: none; border-radius: 8px; font-weight: 900; 
            cursor: pointer; font-family: 'Montserrat', sans-serif; text-transform: uppercase;
        }
        #edit-btn { background: #ffcc00; color: #000; box-shadow: 0 0 15px rgba(255,204,0,0.3); }
        #save-btn { background: #00ff6a; color: #000; display: none; box-shadow: 0 0 15px rgba(0,255,106,0.3); }

        header { margin: 40px 0; text-align: center; }
        h1 { font-family: 'Cinzel Decorative', cursive; font-size: 4rem; color: #ffcc00; margin: 0; filter: drop-shadow(0 0 10px #ffcc00); }

        /* Throne Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin-bottom: 60px; width: 95%; }
        .throne {
            background: #111; border-radius: 20px; padding: 30px 15px;
            text-align: center; flex: 1; border: 1px solid #333; position: relative;
        }
        .rank-1 { border: 3px solid #ffcc00; transform: scale(1.1); background: #1a1a00; }
        
        .p-box {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid #444; overflow: hidden; background: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .p-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .p-box span { font-size: 50px; }

        .name-tag { font-family: 'Montserrat', sans-serif; font-size: 1.4rem; outline: none; text-transform: uppercase; letter-spacing: 1px; }

        /* Slots Grid - BADA SIZE */
        .container { width: 95%; max-width: 1200px; padding-bottom: 100px; }
        .grid-title { 
            font-family: 'Cinzel Decorative', cursive; font-size: 2.5rem; margin: 50px 0 25px; 
            text-align: center; color: #ffcc00; border-bottom: 3px solid #ffcc00; display: inline-block; padding: 0 20px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .plate {
            height: 100px; border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 1.2rem;
            text-align: center; padding: 0 15px; text-transform: uppercase;
        }
        
        .plate span { width: 100%; outline: none; }

        .gold { background: var(--gold); color: #000; border: 1px solid #fff; }
        .silver { background: var(--silver); color: #000; border: 1px solid #fff; }
        .bronze { background: var(--bronze); color: #fff; border: 1px solid #fff; }

        .admin-on [contenteditable="true"] { background: rgba(255,255,255,0.2); border: 2px dashed #fff; border-radius: 8px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="nav">
        <button class="btn" id="edit-btn" onclick="toggleAdmin()">ADMIN MODE: OFF</button>
        <button class="btn" id="save-btn" onclick="saveData()">SAVE & PUBLISH</button>
    </div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="letter-spacing: 8px; color: #ffcc00; font-weight: bold;">RAGHAV EDITZ</p>
    </header>

    <div class="stage">
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k2"><span>🥈</span></div>
            <div class="name-tag" id="txt-k2" contenteditable="false">EMPTY</div>
        </div>
        <div class="throne rank-1">
            <div class="p-box" style="width:150px; height:150px; border-color: #ffcc00;" onclick="pick(this)"><img id="img-k1"><span>👑</span></div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color:#ffcc00; font-size: 1.8rem;">SUPREME KING</div>
        </div>
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k3"><span>🥉</span></div>
            <div class="name-tag" id="txt-k3" contenteditable="false">EMPTY</div>
        </div>
    </div>

    <center><div class="grid-title">GOLD DYNASTY</div></center>
    <div class="container"><div class="grid" id="gold-grid"></div></div>
    
    <center><div class="grid-title" style="color:#d7dde8; border-color:#d7dde8;">SILVER DYNASTY</div></center>
    <div class="container"><div class="grid" id="silver-grid"></div></div>

    <center><div class="grid-title" style="color:#cd7f32; border-color:#cd7f32;">BRONZE LEGION</div></center>
    <div class="container"><div class="grid" id="bronze-grid"></div></div>

    <input type="file" id="fileInp" accept="image/*" onchange="applyImg(event)">

    <script>
        let edit = false;
        let activeTarget = null;

        function toggleAdmin() {
            edit = !edit;
            document.getElementById('edit-btn').innerText = edit ? "ADMIN MODE: ON" : "ADMIN MODE: OFF";
            document.getElementById('edit-btn').style.background = edit ? "#ff4444" : "#ffcc00";
            document.getElementById('save-btn').style.display = edit ? "block" : "none";
            document.getElementById('body').classList.toggle('admin-on');
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = edit);
        }

        function build(gid, count, cls) {
            const g = document.getElementById(gid);
            for(let i=1; i<=count; i++) {
                const d = document.createElement('div');
                d.className = `plate ${cls}`;
                d.innerHTML = `<span id="${gid}-${i}" contenteditable="false">SLOT ${i}</span>`;
                g.appendChild(d);
            }
        }

        function pick(el) { if(edit) { activeTarget = el; document.getElementById('fileInp').click(); } }

        function applyImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                const tempImg = new Image();
                tempImg.src = ev.target.result;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 250; canvas.height = 250;
                    ctx.drawImage(tempImg, 0, 0, 250, 250);
                    const compressedData = canvas.toDataURL('image/jpeg', 0.6);
                    const img = activeTarget.querySelector('img');
                    const span = activeTarget.querySelector('span');
                    img.src = compressedData; img.style.display = 'block';
                    if(span) span.style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            try {
                const d = { txt: {}, img: {} };
                document.querySelectorAll('[contenteditable]').forEach(el => d.txt[el.id] = el.innerText);
                document.querySelectorAll('.p-box img').forEach(i => { if(i.src.includes('data:')) d.img[i.id] = i.src; });
                
                // Sabse bada fix: Purana data saaf karke naya save karna
                localStorage.removeItem('KINGDOM_ULTIMATE');
                localStorage.setItem('KINGDOM_ULTIMATE', JSON.stringify(d));
                
                alert("BHAI, DATA SAVE HO GAYA! Live stream enjoy kar.");
                toggleAdmin();
            } catch(e) {
                alert("ERROR: Image bohot badi hai. Kisi aur ko try kar ya page refresh kar!");
            }
        }

        window.onload = () => {
            build('gold-grid', 10, 'gold');
            build('silver-grid', 15, 'silver');
            build('bronze-grid', 20, 'bronze');

            const s = localStorage.getItem('KINGDOM_ULTIMATE');
            if(!s) return;
            const data = JSON.parse(s);
            for(let id in data.txt) if(document.getElementById(id)) document.getElementById(id).innerText = data.txt[id];
            for(let id in data.img) {
                const i = document.getElementById(id);
                if(i) { 
                    i.src = data.img[id]; i.style.display = 'block'; 
                    if(i.parentElement.querySelector('span')) i.parentElement.querySelector('span').style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
