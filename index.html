<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGDOM PRO | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto:wght@400;900&display=swap');
        
        body {
            margin: 0; background: #000; color: #fff; font-family: 'Roboto', sans-serif;
            display: flex; flex-direction: column; align-items: center;
        }

        /* Control Panel */
        .admin-bar {
            position: sticky; top: 0; width: 100%; background: #111; padding: 10px 0;
            display: flex; justify-content: center; gap: 20px; z-index: 1000; border-bottom: 2px solid #333;
        }
        .btn {
            padding: 10px 25px; border: none; border-radius: 4px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase;
        }
        #edit-btn { background: #ffcc00; color: #000; }
        #save-btn { background: #28a745; color: #fff; display: none; }

        header { margin: 40px 0; text-align: center; }
        h1 { font-family: 'Oswald', sans-serif; font-size: 4rem; margin: 0; color: #ffcc00; letter-spacing: 2px; }

        /* Stage Area */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; width: 95%; margin-bottom: 50px; }
        .throne { background: #1a1a1a; padding: 20px; border-radius: 10px; text-align: center; flex: 1; border: 1px solid #333; }
        .main-king { border: 3px solid #ffcc00; transform: scale(1.1); }
        
        .p-img {
            width: 120px; height: 120px; background: #000; margin: 0 auto 15px;
            border: 2px solid #444; overflow: hidden; display: flex; align-items: center; justify-content: center;
        }
        .p-img img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .name-box { font-weight: 900; font-size: 1.2rem; min-height: 25px; outline: none; text-transform: uppercase; }

        /* Grid System */
        .section-title { width: 90%; font-family: 'Oswald', sans-serif; font-size: 2rem; color: #ffcc00; border-bottom: 2px solid #ffcc00; padding-bottom: 5px; margin: 40px 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; width: 90%; }
        
        .plate {
            background: #222; height: 80px; display: flex; align-items: center; 
            padding: 0 15px; border-radius: 5px; cursor: pointer; position: relative;
        }
        .plate img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; margin-right: 15px; display: none; }
        .plate-name { font-weight: 900; flex-grow: 1; outline: none; }

        /* Color Themes */
        .gold { border-left: 8px solid #ffcc00; }
        .silver { border-left: 8px solid #c0c0c0; }
        .bronze { border-left: 8px solid #cd7f32; }

        .editing .name-box, .editing .plate-name { background: #333; border-radius: 3px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body id="main">

    <div class="admin-bar">
        <button class="btn" id="edit-btn" onclick="toggleEdit()">Edit Mode: OFF</button>
        <button class="btn" id="save-btn" onclick="saveData()">Save Changes</button>
    </div>

    <header>
        <h1 id="main-title" contenteditable="false">THE KINGDOM</h1>
        <div style="font-weight: bold; color: #666;">RAGHAV EDITZ EXCLUSIVE</div>
    </header>

    <div class="stage">
        <div class="throne">
            <div class="p-img" onclick="pick(this)"><img id="img-2"></div>
            <div class="name-box" id="n-2" contenteditable="false">Empty</div>
        </div>
        <div class="throne main-king">
            <div class="p-img" style="width: 150px; height: 150px;" onclick="pick(this)"><img id="img-1"></div>
            <div class="name-box" id="n-1" contenteditable="false">Supreme King</div>
        </div>
        <div class="throne">
            <div class="p-img" onclick="pick(this)"><img id="img-3"></div>
            <div class="name-box" id="n-3" contenteditable="false">Empty</div>
        </div>
    </div>

    <div class="section-title">GOLD SLOTS</div>
    <div class="grid" id="gold-g"></div>

    <div class="section-title" style="color:#c0c0c0; border-color:#c0c0c0;">SILVER SLOTS</div>
    <div class="grid" id="silver-g"></div>

    <div class="section-title" style="color:#cd7f32; border-color:#cd7f32;">BRONZE SLOTS</div>
    <div class="grid" id="bronze-g"></div>

    <input type="file" id="inp" onchange="applyImg(event)">

    <script>
        let isEditing = false;
        let target = null;

        function toggleEdit() {
            isEditing = !isEditing;
            document.getElementById('edit-btn').innerText = isEditing ? "Edit Mode: ON" : "Edit Mode: OFF";
            document.getElementById('edit-btn').style.background = isEditing ? "#ff0000" : "#ffcc00";
            document.getElementById('edit-btn').style.color = isEditing ? "#fff" : "#000";
            document.getElementById('save-btn').style.display = isEditing ? "block" : "none";
            document.getElementById('main').classList.toggle('editing');
            
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = isEditing);
        }

        function create(id, count, cls) {
            const container = document.getElementById(id);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `plate ${cls}`;
                div.innerHTML = `<img id="img-${id}-${i}"><div class="plate-name" id="txt-${id}-${i}" contenteditable="false">PLAYER ${i}</div>`;
                div.onclick = (e) => { if(isEditing && e.target.className !== 'plate-name') pick(div); };
                container.appendChild(div);
            }
        }

        function pick(el) { if(isEditing) { target = el; document.getElementById('inp').click(); } }

        function applyImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = target.querySelector('img');
                img.src = ev.target.result;
                img.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            const d = { text: {}, img: {} };
            document.querySelectorAll('[contenteditable]').forEach(el => d.text[el.id] = el.innerText);
            document.querySelectorAll('img').forEach(i => { if(i.src.includes('data:')) d.img[i.id] = i.src; });
            localStorage.setItem('KINGDOM_V5', JSON.stringify(d));
            alert("Data Saved Successfully!");
            toggleEdit();
        }

        window.onload = () => {
            create('gold-g', 10, 'gold');
            create('silver-g', 15, 'silver');
            create('bronze-g', 20, 'bronze');
            
            const saved = localStorage.getItem('KINGDOM_V5');
            if(!saved) return;
            const d = JSON.parse(saved);
            for(let id in d.text) if(document.getElementById(id)) document.getElementById(id).innerText = d.text[id];
            for(let id in d.img) {
                const img = document.getElementById(id);
                if(img) { img.src = d.img[id]; img.style.display = 'block'; }
            }
        };
    </script>
</body>
</html>
