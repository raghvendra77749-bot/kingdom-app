<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KINGDOM 123 | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Roboto+Mono:wght@700&display=swap');
        
        body {
            margin: 0; background: #0a0a0a; color: #fff; font-family: 'Roboto Mono', monospace;
            display: flex; flex-direction: column; align-items: center; padding-bottom: 100px;
        }

        /* Top Bar */
        .admin-bar {
            position: sticky; top: 0; width: 100%; background: #1a1a1a; padding: 15px 0;
            display: flex; justify-content: center; gap: 15px; z-index: 1000; border-bottom: 2px solid #333;
        }
        .btn {
            padding: 10px 25px; border: none; border-radius: 5px; font-weight: 900; 
            cursor: pointer; text-transform: uppercase; font-family: 'Oswald', sans-serif;
        }
        #edit-btn { background: #ffcc00; color: #000; }
        #save-btn { background: #28a745; color: #fff; display: none; }

        header { margin: 50px 0; text-align: center; }
        h1 { font-family: 'Oswald', sans-serif; font-size: 3.5rem; color: #ffcc00; margin: 0; }
        .tagline { color: #555; letter-spacing: 5px; font-size: 12px; }

        /* Kings Section */
        .kings-container { display: flex; gap: 15px; width: 90%; max-width: 900px; margin-bottom: 40px; }
        .king-box {
            flex: 1; background: #151515; border: 1px solid #333; padding: 25px 10px;
            text-align: center; border-radius: 10px;
        }
        .rank-1 { border: 2px solid #ffcc00; transform: scale(1.05); }
        .rank-num { font-size: 2rem; display: block; margin-bottom: 10px; }
        .king-name { font-size: 1.5rem; outline: none; color: #fff; text-transform: uppercase; }

        /* List Section */
        .list-container { width: 90%; max-width: 800px; }
        .section-header { 
            font-family: 'Oswald', sans-serif; font-size: 1.5rem; padding: 10px;
            margin-top: 30px; border-left: 5px solid #ffcc00; background: #111;
        }
        .row {
            display: flex; align-items: center; background: #1a1a1a; 
            margin: 5px 0; padding: 15px; border-radius: 5px; border: 1px solid #222;
        }
        .num { width: 50px; color: #ffcc00; font-weight: bold; font-size: 1.2rem; }
        .name { flex-grow: 1; outline: none; font-size: 1.1rem; text-transform: uppercase; }

        /* Editing State */
        .editing .name, .editing .king-name { background: #333; padding: 2px 10px; border-radius: 4px; }
    </style>
</head>
<body id="app">

    <div class="admin-bar">
        <button class="btn" id="edit-btn" onclick="toggleEdit()">EDIT: OFF</button>
        <button class="btn" id="save-btn" onclick="saveData()">SAVE DATA</button>
    </div>

    <header>
        <h1>THE KINGDOM</h1>
        <div class="tagline">RAGHAV EDITZ LIVE</div>
    </header>

    <div class="kings-container">
        <div class="king-box">
            <span class="rank-num" style="color:#c0c0c0;">2</span>
            <div class="king-name" id="k-2" contenteditable="false">EMPTY</div>
        </div>
        <div class="king-box rank-1">
            <span class="rank-num" style="color:#ffcc00;">1</span>
            <div class="king-name" id="k-1" contenteditable="false">SUPREME</div>
        </div>
        <div class="king-box">
            <span class="rank-num" style="color:#cd7f32;">3</span>
            <div class="king-name" id="k-3" contenteditable="false">EMPTY</div>
        </div>
    </div>

    <div class="list-container">
        <div class="section-header">GOLD SLOTS</div>
        <div id="gold-list"></div>

        <div class="section-header" style="border-color:#c0c0c0;">SILVER SLOTS</div>
        <div id="silver-list"></div>

        <div class="section-header" style="border-color:#cd7f32;">BRONZE SLOTS</div>
        <div id="bronze-list"></div>
    </div>

    <script>
        let isEdit = false;

        function toggleEdit() {
            isEdit = !isEdit;
            document.getElementById('edit-btn').innerText = isEdit ? "EDIT: ON" : "EDIT: OFF";
            document.getElementById('edit-btn').style.background = isEdit ? "#ff4444" : "#ffcc00";
            document.getElementById('save-btn').style.display = isEdit ? "block" : "none";
            document.getElementById('app').classList.toggle('editing');
            
            document.querySelectorAll('[contenteditable]').forEach(el => el.contentEditable = isEdit);
        }

        function build(containerId, count) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                row.innerHTML = `<div class="num">#${i}</div><div class="name" id="${containerId}-${i}" contenteditable="false">EMPTY SLOT</div>`;
                container.appendChild(row);
            }
        }

        function saveData() {
            const data = {};
            document.querySelectorAll('[contenteditable]').forEach(el => data[el.id] = el.innerText);
            localStorage.setItem('KINGDOM_123_DATA', JSON.stringify(data));
            alert("Data Saved!");
            toggleEdit();
        }

        function loadData() {
            build('gold-list', 10);
            build('silver-list', 15);
            build('bronze-list', 20);

            const saved = localStorage.getItem('KINGDOM_123_DATA');
            if(!saved) return;
            const data = JSON.parse(saved);
            for(let id in data) {
                if(document.getElementById(id)) document.getElementById(id).innerText = data[id];
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
