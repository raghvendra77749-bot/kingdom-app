<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Bebas+Neue&family=Poppins:wght@700&display=swap');
        
        :root {
            --gold: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728);
            --silver: linear-gradient(135deg, #757f9a, #d7dde8, #757f9a);
            --bronze: linear-gradient(135deg, #804a00, #cd7f32, #593300);
            --accent: #ff007f;
        }

        body {
            margin: 0; background: #000; color: #fff; font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }

        .nav {
            position: sticky; top: 0; width: 100%; background: rgba(0,0,0,0.9);
            padding: 15px 0; display: flex; justify-content: space-around;
            border-bottom: 1px solid #333; z-index: 1000; backdrop-filter: blur(10px);
        }

        .btn {
            background: var(--accent); color: white; border: none; padding: 10px 25px;
            border-radius: 5px; font-weight: 900; cursor: pointer; font-family: 'Bebas Neue', cursive;
            letter-spacing: 1px; font-size: 1.2rem;
        }

        header { margin-top: 40px; text-align: center; }
        h1 { font-family: 'Cinzel', serif; font-size: 3.5rem; color: #ffcc00; margin: 0; text-shadow: 0 0 20px rgba(255,204,0,0.4); }

        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 50px 0; width: 95%; }
        .throne {
            background: #111; border-radius: 20px; padding: 25px 15px;
            text-align: center; flex: 1; border: 1px solid #333;
        }
        .rank-1 { border: 2px solid #ffcc00; transform: scale(1.1); box-shadow: 0 0 30px rgba(255,204,0,0.2); }
        
        .p-box {
            width: 100px; height: 100px; border-radius: 50%; margin: 0 auto 15px;
            border: 2px solid #444; overflow: hidden; background: #000; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .p-box img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .p-box span { font-size: 40px; }

        .name-tag { font-family: 'Cinzel', serif; font-size: 1.2rem; outline: none; text-transform: uppercase; }

        .container { width: 92%; max-width: 1100px; padding-bottom: 100px; }
        .grid-title { 
            font-family: 'Bebas Neue', cursive; font-size: 2.2rem; margin: 40px 0 20px; 
            letter-spacing: 2px; color: #ffcc00; border-bottom: 2px solid #333;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        
        .plate {
            height: 80px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.9rem;
            text-align: center; padding: 0 10px; cursor: default;
        }
        
        .plate span { width: 100%; outline: none; }

        .gold { background: var(--gold); color: #000; }
        .silver { background: var(--silver); color: #000; }
        .bronze { background: var(--bronze); color: #fff; }

        .admin-on [contenteditable="true"] { background: rgba(255,255,255,0.15); border-radius: 5px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="nav">
        <button class="btn" id="adminBtn" onclick="toggleAdmin()">ADMIN MODE: OFF</button>
        <button class="btn" id="saveBtn" style="background:#28a745; display:none;" onclick="saveData()">SAVE & PUBLISH</button>
    </div>

    <header>
        <h1>THE KINGDOM</h1>
        <p style="letter-spacing: 5px; color: #555;">RAGHAV EDITZ EXCLUSIVE</p>
    </header>

    <div class="stage">
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k2"><span>🥈</span></div>
            <div class="name-tag" id="txt-k2" contenteditable="false">VACANT</div>
        </div>
        <div class="throne rank-1">
            <div class="p-box" style="width:130px; height:130px;" onclick="pick(this)"><img id="img-k1"><span>👑</span></div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color:#ffcc00;">SUPREME KING</div>
        </div>
        <div class="throne">
            <div class="p-box" onclick="pick(this)"><img id="img-k3"><span>🥉</span></div>
            <div class="name-tag" id="txt-k3" contenteditable="false">VACANT</div>
        </div>
    </div>

    <div class="container">
        <div class="grid-title">GOLD DYNASTY</div>
        <div class="grid" id="gold-grid"></div>
        
        <div class="grid-title" style="color:#d7dde8;">SILVER DYNASTY</div>
        <div class="grid" id="silver-grid"></div>

        <div class="grid-title" style="color:#cd7f32;">BRONZE LEGION</div>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="fileInp" accept="image/*" onchange="applyImg(event)">

    <script>
        let edit = false;
        let activeTarget = null;

        function toggleAdmin() {
            edit = !edit;
            document.getElementById('adminBtn').innerText = edit ? "ADMIN MODE: ON" : "ADMIN MODE: OFF";
            document.getElementById('saveBtn').style.display = edit ? "block" : "none";
            document.getElementById('body').classList.toggle('admin-on');
            document.querySelectorAll('[id^="txt-"], [id*="-grid-"]').forEach(el => el.contentEditable = edit);
        }

        function build(gid, count, cls) {
            const g = document.getElementById(gid);
            for(let i=1; i<=count; i++) {
                const d = document.createElement('div');
                d.className = `plate ${cls}`;
                d.innerHTML = `<span id="${gid}-${i}" contenteditable="false">SLOT ${i}</span>`;
                g.appendChild(d);
            }
        }

        function pick(el) { if(edit) { activeTarget = el; document.getElementById('fileInp').click(); } }

        function applyImg(e) {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                const tempImg = new Image();
                tempImg.src = ev.target.result;
                tempImg.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    // Resize to 300px for small size but good quality
                    canvas.width = 300;
                    canvas.height = 300;
                    ctx.drawImage(tempImg, 0, 0, 300, 300);
                    
                    const compressedData = canvas.toDataURL('image/jpeg', 0.7); // 70% quality
                    const img = activeTarget.querySelector('img');
                    const span = activeTarget.querySelector('span');
                    img.src = compressedData;
                    img.style.display = 'block';
                    if(span) span.style.display = 'none';
                };
            };
            reader.readAsDataURL(file);
        }

        function saveData() {
            const d = { txt: {}, img: {} };
            document.querySelectorAll('[contenteditable]').forEach(el => d.txt[el.id] = el.innerText);
            document.querySelectorAll('.p-box img').forEach(i => { if(i.src.includes('data:')) d.img[i.id] = i.src; });
            
            localStorage.setItem('KINGDOM_COMPRESSED', JSON.stringify(d));
            alert("Success! Sub Save ho gaya.");
            toggleAdmin();
        }

        window.onload = () => {
            build('gold-grid', 10, 'gold');
            build('silver-grid', 15, 'silver');
            build('bronze-grid', 20, 'bronze');

            const s = localStorage.getItem('KINGDOM_COMPRESSED');
            if(!s) return;
            const data = JSON.parse(s);
            for(let id in data.txt) if(document.getElementById(id)) document.getElementById(id).innerText = data.txt[id];
            for(let id in data.img) {
                const i = document.getElementById(id);
                if(i) { 
                    i.src = data.img[id]; i.style.display = 'block'; 
                    if(i.parentElement.querySelector('span')) i.parentElement.querySelector('span').style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
