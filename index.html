<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE KINGDOM PRO | RAGHAV EDITZ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Poppins:wght@300;400;700&display=swap');
        
        :root {
            --gold: linear-gradient(135deg, #ff9d00 0%, #ffeb3b 50%, #ff9d00 100%);
            --silver: linear-gradient(135deg, #757f9a 0%, #d7dde8 50%, #757f9a 100%);
            --bronze: linear-gradient(135deg, #804a00 0%, #cd7f32 50%, #804a00 100%);
            --neon: #00f2ff;
            --pink: #ff007f;
        }

        body {
            margin: 0; background: #050505; color: #fff; font-family: 'Poppins', sans-serif;
            display: flex; flex-direction: column; align-items: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Background */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            z-index: -1;
        }

        /* Header UI */
        .header-ui {
            width: 100%; padding: 20px 0; background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1);
            position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-around; align-items: center;
        }

        .logo-text { font-family: 'Cinzel', serif; font-size: 1.8rem; color: #ffcc00; text-shadow: 0 0 15px rgba(255,204,0,0.5); }

        .btn-admin {
            background: transparent; color: #fff; border: 2px solid var(--pink);
            padding: 8px 25px; border-radius: 5px; cursor: pointer; font-weight: bold;
            transition: 0.3s; box-shadow: 0 0 10px var(--pink);
        }
        .btn-admin.active { background: var(--pink); box-shadow: 0 0 25px var(--pink); }

        .btn-save {
            background: var(--neon); color: #000; border: none; padding: 10px 30px;
            border-radius: 5px; font-weight: 900; cursor: pointer; display: none;
            box-shadow: 0 0 20px var(--neon);
        }

        /* The Throne Section */
        .stage { display: flex; align-items: flex-end; justify-content: center; gap: 20px; margin: 60px 0; width: 95%; }
        
        .card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 25px 15px; text-align: center; flex: 1;
            transition: 0.4s; position: relative; overflow: hidden;
        }
        .card:hover { transform: translateY(-10px); background: rgba(255, 255, 255, 0.08); }
        .king-card { border: 2px solid #ffcc00; transform: scale(1.1); box-shadow: 0 0 30px rgba(255,204,0,0.2); }

        .avatar {
            width: 110px; height: 110px; border-radius: 50%; margin: 0 auto 15px;
            border: 3px solid #333; cursor: pointer; overflow: hidden; background: #111;
            display: flex; align-items: center; justify-content: center;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .avatar span { font-size: 10px; color: #666; }

        .name-tag {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 1.1rem;
            outline: none; border-bottom: 1px solid transparent;
        }
        .admin-on .name-tag { border-bottom: 1px dashed #555; }

        /* Grids */
        .grid-section { width: 90%; max-width: 1200px; margin-bottom: 100px; }
        .grid-title { 
            font-family: 'Cinzel', serif; font-size: 1.5rem; margin-bottom: 20px; 
            text-transform: uppercase; letter-spacing: 3px; border-left: 5px solid var(--neon); padding-left: 15px;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; }

        .plate {
            height: 80px; border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            overflow: hidden; cursor: pointer; transition: 0.3s; border: 1px solid rgba(0,0,0,0.2);
        }
        .plate img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        .plate-name { z-index: 5; font-family: 'Cinzel', serif; font-weight: 900; outline: none; }

        .gold { background: var(--gold); color: #3d2b1f; box-shadow: 0 5px 15px rgba(255, 157, 0, 0.3); }
        .silver { background: var(--silver); color: #222; box-shadow: 0 5px 15px rgba(117, 127, 154, 0.3); }
        .bronze { background: var(--bronze); color: #fff; box-shadow: 0 5px 15px rgba(128, 74, 0, 0.3); }

        .has-img::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 2; }
        .has-img .plate-name { color: #fff !important; text-shadow: 0 0 10px #000; }

        input[type="file"] { display: none; }
    </style>
</head>
<body id="body">

    <div class="header-ui">
        <div class="logo-text">THE KINGDOM</div>
        <div style="display: flex; gap: 10px;">
            <button class="btn-admin" id="adminBtn" onclick="toggleAdmin()">ADMIN: OFF</button>
            <button class="btn-save" id="saveBtn" onclick="saveData()">PUBLISH CHANGES</button>
        </div>
    </div>

    <div class="stage">
        <div class="card">
            <div class="avatar" onclick="triggerFile(this)"><img id="img-k2"><span>🥈</span></div>
            <div class="name-tag" id="txt-k2" contenteditable="false">VACANT</div>
        </div>
        <div class="card king-card">
            <div class="avatar" style="width: 140px; height: 140px;" onclick="triggerFile(this)"><img id="img-k1"><span>👑</span></div>
            <div class="name-tag" id="txt-k1" contenteditable="false" style="color: #ffcc00; font-size: 1.4rem;">SUPREME KING</div>
        </div>
        <div class="card">
            <div class="avatar" onclick="triggerFile(this)"><img id="img-k3"><span>🥉</span></div>
            <div class="name-tag" id="txt-k3" contenteditable="false">VACANT</div>
        </div>
    </div>

    <div class="grid-section">
        <h2 class="grid-title" style="color: #ffcc00;">Gold Dynasty</h2>
        <div class="grid" id="gold-grid"></div>
        
        <h2 class="grid-title" style="color: #d7dde8; border-color: #d7dde8; margin-top: 50px;">Silver Dynasty</h2>
        <div class="grid" id="silver-grid"></div>

        <h2 class="grid-title" style="color: #cd7f32; border-color: #cd7f32; margin-top: 50px;">Bronze Legion</h2>
        <div class="grid" id="bronze-grid"></div>
    </div>

    <input type="file" id="fileInp" onchange="loadImg(event)">

    <script>
        let isEdit = false;
        let activeBox = null;

        function toggleAdmin() {
            isEdit = !isEdit;
            const btn = document.getElementById('adminBtn');
            const save = document.getElementById('saveBtn');
            const body = document.getElementById('body');
            
            btn.innerText = isEdit ? "ADMIN: ON" : "ADMIN: OFF";
            btn.classList.toggle('active');
            save.style.display = isEdit ? "block" : "none";
            body.classList.toggle('admin-on');

            document.querySelectorAll('[contenteditable]').forEach(el => {
                el.contentEditable = isEdit;
            });
        }

        function createGrid(containerId, count, cls) {
            const container = document.getElementById(containerId);
            for(let i=1; i<=count; i++) {
                const div = document.createElement('div');
                div.className = `plate ${cls}`;
                div.id = `${containerId}-s${i}`;
                div.innerHTML = `<img class="p-img"><div class="plate-name" id="txt-${div.id}" contenteditable="false">SLOT ${i}</div>`;
                div.onclick = (e) => { if(isEdit && e.target.className !== 'plate-name') triggerFile(div); };
                container.appendChild(div);
            }
        }

        function triggerFile(el) { if(isEdit) { activeBox = el; document.getElementById('fileInp').click(); } }

        function loadImg(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = activeBox.querySelector('img');
                img.src = ev.target.result;
                img.style.display = 'block';
                activeBox.classList.add('has-img');
            };
            reader.readAsDataURL(file);
        }

            document.querySelectorAll('[contenteditable]').forEach(el => data.txt[el.id] = el.innerText);
            document.querySelectorAll('img').forEach((img, i) => {
                if(img.src.startsWith('data:')) data.img[img.id || `idx-${i}`] = img.src;
            });
